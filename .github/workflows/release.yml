name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: RecipeStudio.Desktop.exe
            archive_kind: zip
          - os: windows-latest
            rid: win-x86
            executable: RecipeStudio.Desktop.exe
            archive_kind: zip
          - os: windows-latest
            rid: win-arm64
            executable: RecipeStudio.Desktop.exe
            archive_kind: zip
          - os: ubuntu-latest
            rid: linux-x64
            executable: RecipeStudio.Desktop
            archive_kind: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore RecipeStudio.sln

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $projectPath = "src/RecipeStudio.Desktop/RecipeStudio.Desktop.csproj"
          $publishDir = "publish/$rid"
          dotnet publish $projectPath `
            -c Release `
            -r $rid `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:GenerateDocumentationFile=false `
            -o $publishDir

          $executable = "${{ matrix.executable }}"
          if (-not (Test-Path "$publishDir/$executable")) {
            throw "$publishDir/$executable not found"
          }

      - name: Pack release asset
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $tag = "${{ github.ref_name }}"
          $executable = "${{ matrix.executable }}"
          $archiveKind = "${{ matrix.archive_kind }}"
          $publishDir = "publish/$rid"
          $stagingDir = "staging/$rid"

          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Copy-Item "$publishDir/$executable" "$stagingDir/$executable" -Force
          Copy-Item RELEASE_README.md "$stagingDir/README.md" -Force

          if ($archiveKind -eq "zip") {
            $assetName = "recipestudio-$tag-$rid.zip"
            Compress-Archive -Path "$stagingDir/*" -DestinationPath "release-assets/$assetName" -Force
          }
          else {
            $assetName = "recipestudio-$tag-$rid.tar.gz"
            tar -czf "release-assets/$assetName" -C $stagingDir .
          }

          $hash = (Get-FileHash "release-assets/$assetName" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $assetName" | Out-File -FilePath "release-assets/SHA256SUMS-$rid.txt" -Encoding ascii

      - name: Build Linux deb package
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          bash scripts/build-linux-deb.sh "${{ github.ref_name }}" "publish/${{ matrix.rid }}" "release-assets"
          cd release-assets
          sha256sum ./*.deb > "SHA256SUMS-${{ matrix.rid }}-deb.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Merge checksums
        run: cat release-assets/SHA256SUMS-*.txt > release-assets/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
            release-assets/*.deb
            release-assets/SHA256SUMS.txt
